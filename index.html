<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVNNE 応援サイト</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets2/css/style.css">
</head>

<body>

  <!-- =========================
       ヘッダー
  ========================== -->
  <header class="main-header">
    <div class="header-bg"></div>
    <img src="assets/img/evnne_logo_red.jpg" class="header-logo" alt="EVNNE ロゴ">
    <div class="header-info">
      <h1>EVNNE 応援サイト</h1>
      <p>投票・配信・スケジュールまとめ</p>
    </div>
  </header>

  <!-- =========================
       LINE
  ========================== -->
  <h2 class="section-title">💬 LINE オープンチャット</h2>
  <div class="section line-box">
    <p>EVNNE 応援用の LINE オープンチャットは現在準備中です。</p>
    <p>※ 公開され次第、ここにリンクとパスワード案内を掲載します。</p>
  </div>

  <!-- =========================
       TODAY’S MISSION
  ========================== -->
  <h2 class="section-title">🔥 TODAY’S MISSION</h2>
  <div class="section" id="today-mission">読み込み中…</div>

  <script>
    fetch("missions/today.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("today-mission").innerHTML = html;
      })
      .catch(() => {
        document.getElementById("today-mission").innerHTML = "読み込みエラー";
      });
  </script>

  <!-- =========================
       X（Twitter タイムライン）
  ========================== -->
  <h2 class="section-title">🗳 Voteチーム 最新投稿</h2>
  <div class="section twitter-box">
    <a class="twitter-timeline"
       data-theme="dark"
       href="https://twitter.com/evnne_japanvote">
       最新の投稿を読む
    </a>
  </div>

  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

  <!-- =========================
       アプリカード
  ========================== -->
  <h2 class="section-title">📱 投票アプリ別ガイド</h2>

  <div class="app-card-grid">
    <a href="apps/idolchamp.html" class="app-card">
      <img src="assets/img/apps/idolchamp.png" alt="IDOL CHAMP">
      <span>IDOL CHAMP</span>
    </a>

    <a href="apps/fancast.html" class="app-card">
      <img src="assets/img/apps/fancast.png" alt="FANCAST">
      <span>FANCAST</span>
    </a>

    <a href="apps/higher.html" class="app-card">
      <img src="assets/img/apps/higher.png" alt="HIGHER">
      <span>HIGHER</span>
    </a>

    <a href="apps/linc.html" class="app-card">
      <img src="assets/img/apps/linc.png" alt="LiNC">
      <span>LiNC</span>
    </a>

    <a href="apps/mubeat.html" class="app-card">
      <img src="assets/img/apps/mubeat.png" alt="Mubeat">
      <span>Mubeat</span>
    </a>

    <a href="apps/mnetplus.html" class="app-card">
      <img src="assets/img/apps/mnetplus.png" alt="Mnet Plus">
      <span>Mnet Plus</span>
    </a>

    <a href="apps/duckad.html" class="app-card">
      <img src="assets/img/apps/duckad.png" alt="DUCK AD">
      <span>DUCK AD</span>
    </a>
  </div>

  <!-- =========================
       フッター
  ========================== -->
  <footer class="main-footer">
    <p>EVNNE 応援サイト</p>
    <p class="small">© 2026 Vote Team</p>
  </footer>

</body>
</html>
